<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직무조사 자료실</title>
<style>
  :root {
    --navy: #1D3461;
    --navy-light: #2E4A82;
    --line: #D8DEE9;
    --gray-text: #6B7280;
    --bg: #F7F8FA;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Pretendard", "Malgun Gothic", -apple-system, sans-serif;
    background: var(--bg);
    color: #1F2937;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }
  .header { margin-bottom: 28px; }
  .eyebrow {
    font-size: 12px;
    font-weight: 700;
    color: var(--navy-light);
    letter-spacing: .06em;
    margin: 0 0 8px;
  }
  .dl-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--navy);
    margin: 0 0 6px;
  }
  .dl-sub {
    font-size: 13px;
    color: var(--gray-text);
    margin: 0;
    line-height: 1.6;
  }
  .dl-list { display: flex; flex-direction: column; gap: 10px; }
  .dl-btn {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 14px 15px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    text-decoration: none;
    cursor: pointer;
    transition: all .15s ease;
  }
  .dl-btn:hover {
    border-color: var(--navy);
    box-shadow: 0 3px 10px rgba(29,52,97,.12);
    transform: translateY(-1px);
  }
  .dl-icon {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .3px;
  }
  .ic-pdf  { background: #C8362F; }
  .ic-pptx { background: #C25823; }
  .dl-meta { display: flex; flex-direction: column; min-width: 0; }
  .dl-name {
    font-size: 13px;
    font-weight: 600;
    color: #1F2937;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dl-size { font-size: 11px; color: var(--gray-text); margin-top: 1px; }
  .dl-arrow { margin-left: auto; color: var(--navy); flex-shrink: 0; font-size: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <p class="eyebrow">직무조사 자료실</p>
    <p class="dl-title">📂 직무조사 관련 자료 다운로드</p>
    <p class="dl-sub">조사 시작 전, 아래 자료를 다운로드하여 내용을 확인해 주시기 바랍니다.</p>
  </div>
  <div class="dl-list">

    <a class="dl-btn" href="assets/'26~'30 중장기 경영전략체계(안).pdf" download>
      <div class="dl-icon ic-pdf">PDF</div>
      <div class="dl-meta">
        <div class="dl-name">'26~'30 중장기 경영전략체계(안)</div>
        <div class="dl-size">PDF · 223 KB</div>
      </div>
      <div class="dl-arrow">↓</div>
    </a>

    <a class="dl-btn" href="assets/260227_SH공사_조직진단·인력분석 및 조직재설계_v1.0(준공검수용).pptx" download>
      <div class="dl-icon ic-pptx">PPT</div>
      <div class="dl-meta">
        <div class="dl-name">260227_SH공사_조직진단·인력분석 및 조직재설계_v1.0</div>
        <div class="dl-size">PPTX · 24 MB</div>
      </div>
      <div class="dl-arrow">↓</div>
    </a>

    <a class="dl-btn" href="assets/[SH] 중장기 경영전략 중간 진단 보고서.pdf" download>
      <div class="dl-icon ic-pdf">PDF</div>
      <div class="dl-meta">
        <div class="dl-name">[SH] 중장기 경영전략 중간 진단 보고서</div>
        <div class="dl-size">PDF · 59 MB</div>
      </div>
      <div class="dl-arrow">↓</div>
    </a>

  </div>
</div>
</body>
</html>
